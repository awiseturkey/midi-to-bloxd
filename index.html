<!DOCTYPE html>
<html lang="en">
<head>
  <p id="output"></p>
  <meta charset="UTF-8" />
  <title>MIDI to JSON Converter</title>
  <script src="https://unpkg.com/@tonejs/midi"></script>
  <script src="script.js" defer></script>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #output { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>
  <h1>MIDI to JSON Converter</h1>
  <p>Drop a MIDI file to convert it to JSON with pitch values (C4 = 1.0)</p>
  <input type="file" accept=".mid,.midi" id="fileInput" />
  <button id="copyBtn">Copy Output</button>
  
  <div id="output" tabindex="0"></div>
</body>
</html>
